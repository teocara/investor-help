<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EquityScreen Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--paper:#161b22;--card:#1c2128;--card-b:#30363d;--line:#21262d;
  --text:#e6edf3;--dim:#8b949e;--accent:#3fb950;--blue:#58a6ff;
  --red:#f85149;--yellow:#d29922;--purple:#a371f7;--sidebar:260px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;min-height:100vh;display:flex;}

/* Sidebar */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--paper);border-right:1px solid var(--line);padding:0;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto;}
.sb-head{padding:1rem;border-bottom:1px solid var(--line);}
.sb-title{font-size:1rem;font-weight:700;color:var(--text);letter-spacing:-.01em;}
.sb-sub{font-size:.7rem;color:var(--dim);margin-top:.15rem;}
.sb-body{padding:.75rem;flex:1;overflow-y:auto;}
.sb-section{margin-bottom:1rem;}
.sb-label{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);margin-bottom:.4rem;}
.sb-input{width:100%;background:var(--card);border:1px solid var(--card-b);color:var(--text);padding:.35rem .5rem;border-radius:5px;font-size:.8rem;font-family:inherit;}
.sb-input:focus{outline:none;border-color:var(--blue);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;}
.quick-btns{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.35rem;}
.qbtn{font-size:.65rem;padding:.22rem .5rem;border-radius:4px;border:1px solid var(--card-b);background:transparent;color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .12s;}
.qbtn:hover,.qbtn.on{border-color:var(--blue);color:var(--blue);background:rgba(88,166,255,.1);}
.qbtn.os.on{border-color:var(--accent);color:var(--accent);background:rgba(63,185,80,.1);}
.qbtn.ob.on{border-color:var(--red);color:var(--red);background:rgba(248,81,73,.1);}
.type-toggle{display:flex;gap:0;border:1px solid var(--card-b);border-radius:5px;overflow:hidden;}
.type-btn{flex:1;padding:.32rem;text-align:center;cursor:pointer;font-size:.75rem;color:var(--dim);background:transparent;border:none;transition:all .12s;}
.type-btn.on{background:rgba(88,166,255,.15);color:var(--blue);}
.sector-list{display:flex;flex-direction:column;gap:.28rem;max-height:180px;overflow-y:auto;}
.sector-item{display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.75rem;color:var(--dim);}
.sector-item input{accent-color:var(--blue);}
.sector-item:hover{color:var(--text);}
.presets{display:flex;flex-wrap:wrap;gap:.3rem;}
.preset{font-size:.68rem;padding:.25rem .5rem;border-radius:4px;border:1px solid var(--card-b);background:var(--card);color:var(--dim);cursor:pointer;transition:all .12s;}
.preset:hover{border-color:var(--blue);color:var(--blue);}
.sb-foot{padding:.75rem;border-top:1px solid var(--line);}
.reset-btn{width:100%;padding:.4rem;border-radius:5px;border:1px solid var(--card-b);background:transparent;color:var(--dim);cursor:pointer;font-size:.75rem;font-family:inherit;}
.reset-btn:hover{border-color:var(--red);color:var(--red);}
.results-count{font-size:.7rem;color:var(--dim);margin-bottom:.4rem;}

/* Main */
#main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.statsbar{display:flex;gap:1.5rem;padding:.65rem 1rem;background:var(--paper);border-bottom:1px solid var(--line);flex-wrap:wrap;}
.stat{display:flex;flex-direction:column;}
.stat-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);}
.stat-v{font-size:.95rem;font-weight:600;margin-top:.05rem;}

.table-wrap{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:.8rem;}
th{background:var(--paper);padding:.5rem .6rem;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;color:var(--dim);font-size:.67rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0;z-index:2;}
th:hover{color:var(--text);}
th .sort-arrow{margin-left:.25rem;opacity:.4;}
th.sorted .sort-arrow{opacity:1;color:var(--blue);}
td{padding:.42rem .6rem;border-bottom:1px solid var(--line);white-space:nowrap;}
tbody tr{cursor:pointer;transition:background .1s;}
tbody tr:hover td{background:rgba(88,166,255,.04);}
tbody tr.active td{background:rgba(88,166,255,.08);}
.tc{font-weight:700;color:var(--blue);}
.rsi-badge{display:inline-block;padding:.1rem .38rem;border-radius:4px;font-weight:600;font-size:.72rem;}
.rsi-os{background:rgba(63,185,80,.18);color:var(--accent);}
.rsi-ob{background:rgba(248,81,73,.15);color:var(--red);}
.rsi-n{background:rgba(139,148,158,.12);color:var(--dim);}
.sc-badge{display:inline-block;padding:.1rem .38rem;border-radius:4px;font-weight:600;font-size:.72rem;}
.sc-h{background:rgba(63,185,80,.18);color:var(--accent);}
.sc-m{background:rgba(210,153,34,.18);color:var(--yellow);}
.sc-l{background:rgba(248,81,73,.15);color:var(--red);}
.type-tag{font-size:.65rem;padding:.06rem .32rem;border-radius:3px;border:1px solid var(--card-b);color:var(--dim);}

.pagination{display:flex;align-items:center;gap:.4rem;padding:.6rem 1rem;background:var(--paper);border-top:1px solid var(--line);justify-content:flex-end;}
.pg-btn{padding:.28rem .55rem;border-radius:4px;border:1px solid var(--card-b);background:transparent;color:var(--dim);cursor:pointer;font-size:.75rem;}
.pg-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);}
.pg-btn:disabled{opacity:.35;cursor:not-allowed;}
.pg-btn.active{background:rgba(88,166,255,.15);border-color:var(--blue);color:var(--blue);}
.pg-info{font-size:.72rem;color:var(--dim);margin-right:.5rem;}

/* Drawer */
#drawer{position:fixed;top:0;right:-400px;width:390px;height:100vh;background:var(--paper);border-left:1px solid var(--line);z-index:100;transition:right .25s ease;overflow-y:auto;display:flex;flex-direction:column;}
#drawer.open{right:0;}
.dr-head{padding:1rem;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:.5rem;}
.dr-close{background:none;border:none;color:var(--dim);font-size:1.1rem;cursor:pointer;padding:.1rem .2rem;margin-left:auto;}
.dr-close:hover{color:var(--text);}
.dr-ticker{font-size:1.3rem;font-weight:700;color:var(--blue);}
.dr-name{font-size:.82rem;color:var(--dim);margin-top:.1rem;}
.dr-body{padding:1rem;flex:1;}
.dr-price{font-size:1.4rem;font-weight:700;margin-bottom:.75rem;}

/* RSI Gauge */
.rsi-gauge{margin-bottom:1rem;}
.gauge-wrap{position:relative;height:80px;margin-bottom:.35rem;}
.gauge-svg{width:100%;height:80px;}
.gauge-val{text-align:center;font-size:1.1rem;font-weight:700;}
.gauge-label{text-align:center;font-size:.72rem;color:var(--dim);margin-top:.1rem;}

.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem;}
.kv{background:var(--card);border:1px solid var(--card-b);border-radius:5px;padding:.5rem .65rem;}
.kv-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-bottom:.15rem;}
.kv-v{font-size:.95rem;font-weight:600;}
.dr-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:.35rem;margin-top:.75rem;}
.notes-ta{width:100%;background:var(--card);border:1px solid var(--card-b);color:var(--text);padding:.5rem;border-radius:5px;font-size:.8rem;font-family:inherit;resize:vertical;min-height:80px;}
.notes-ta:focus{outline:none;border-color:var(--accent);}
.yf-btn{display:block;width:100%;margin-top:.75rem;padding:.45rem;border-radius:5px;border:1px solid var(--blue);background:rgba(88,166,255,.1);color:var(--blue);text-align:center;cursor:pointer;font-size:.8rem;text-decoration:none;font-family:inherit;}
.yf-btn:hover{background:rgba(88,166,255,.2);}
.ta-pill{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.72rem;font-weight:600;margin-top:.3rem;}
.ta-bull{background:rgba(63,185,80,.18);color:var(--accent);}
.ta-bear{background:rgba(248,81,73,.15);color:var(--red);}
.ta-neut{background:rgba(139,148,158,.12);color:var(--dim);}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;}
#overlay.on{display:block;}
</style>
</head>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-head">
    <div class="sb-title">EquityScreen Pro</div>
    <div class="sb-sub">340 securities · live filters</div>
  </div>
  <div class="sb-body">

    <div class="sb-section">
      <input class="sb-input" id="searchBox" placeholder="Search ticker or name…">
    </div>

    <div class="sb-section">
      <div class="type-toggle">
        <button class="type-btn on" data-t="">All</button>
        <button class="type-btn" data-t="Stock">Stocks</button>
        <button class="type-btn" data-t="ETF">ETFs</button>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">RSI</div>
      <div class="row2">
        <input class="sb-input" id="rsiMin" type="number" placeholder="Min" min="0" max="100">
        <input class="sb-input" id="rsiMax" type="number" placeholder="Max" min="0" max="100">
      </div>
      <div class="quick-btns">
        <button class="qbtn os" data-rsi="os">Oversold &lt;30</button>
        <button class="qbtn" data-rsi="n">Neutral</button>
        <button class="qbtn ob" data-rsi="ob">Overbought &gt;70</button>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Score (min)</div>
      <input class="sb-input" id="scoreMin" type="number" placeholder="e.g. 7" min="1" max="10">
    </div>

    <div class="sb-section">
      <div class="sb-label">Valuation</div>
      <div class="row2">
        <input class="sb-input" id="peMax" type="number" placeholder="P/E max">
        <input class="sb-input" id="fpeMax" type="number" placeholder="Fwd P/E max">
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Growth</div>
      <div class="row2">
        <input class="sb-input" id="epsMin" type="number" placeholder="EPS gr% min">
        <input class="sb-input" id="revMin" type="number" placeholder="Rev gr% min">
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Profitability</div>
      <input class="sb-input" id="roeMin" type="number" placeholder="ROE% min">
    </div>

    <div class="sb-section">
      <div class="sb-label">Sector</div>
      <div class="sector-list" id="sectorList"></div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Presets</div>
      <div class="presets">
        <button class="preset" data-p="all">All</button>
        <button class="preset" data-p="highscore">High Score</button>
        <button class="preset" data-p="value">Value Picks</button>
        <button class="preset" data-p="growth">Growth Stars</button>
        <button class="preset" data-p="oversold">Oversold RSI</button>
        <button class="preset" data-p="overbought">Overbought</button>
      </div>
    </div>

  </div>
  <div class="sb-foot">
    <div class="results-count" id="resultsCount">— results</div>
    <button class="reset-btn" id="resetBtn">Reset All Filters</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div class="statsbar" id="statsbar"></div>
  <div class="table-wrap">
    <table>
      <thead id="thead"><tr>
        <th data-k="ticker">Ticker <span class="sort-arrow">↕</span></th>
        <th data-k="name">Name <span class="sort-arrow">↕</span></th>
        <th data-k="sector">Sector <span class="sort-arrow">↕</span></th>
        <th data-k="type">Type <span class="sort-arrow">↕</span></th>
        <th data-k="price">Price <span class="sort-arrow">↕</span></th>
        <th data-k="rsi">RSI <span class="sort-arrow">↕</span></th>
        <th data-k="pe">P/E <span class="sort-arrow">↕</span></th>
        <th data-k="fwdPe">Fwd P/E <span class="sort-arrow">↕</span></th>
        <th data-k="eps_growth">EPS Gr% <span class="sort-arrow">↕</span></th>
        <th data-k="score">Score <span class="sort-arrow">↕</span></th>
        <th data-k="notes" style="min-width:180px">Notes</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Drawer -->
<div id="overlay"></div>
<div id="drawer">
  <div class="dr-head">
    <div>
      <div class="dr-ticker" id="dr-ticker"></div>
      <div class="dr-name" id="dr-name"></div>
    </div>
    <button class="dr-close" id="drClose">&times;</button>
  </div>
  <div class="dr-body">
    <div class="dr-price" id="dr-price"></div>
    <div class="rsi-gauge">
      <div class="gauge-wrap"><svg class="gauge-svg" viewBox="0 0 200 80" id="gaugeSvg"></svg></div>
      <div class="gauge-val" id="gaugeVal"></div>
      <div class="gauge-label" id="gaugeLabel"></div>
    </div>
    <div class="kv-grid" id="dr-kv"></div>
    <div class="dr-label">TA Signal</div>
    <div id="dr-signal"></div>
    <div class="dr-label">Notes / Thesis</div>
    <textarea class="notes-ta" id="dr-notes" rows="4" placeholder="Add your notes…"></textarea>
    <a class="yf-btn" id="dr-yf" target="_blank">View Chart on Yahoo Finance ↗</a>
  </div>
</div>

/* ── State ───────────────────────────────────────────── */
const NOTES_KEY="eqscreen_notes", FILT_KEY="eqscreen_filters";
let notes={}; try{notes=JSON.parse(localStorage.getItem(NOTES_KEY)||"{}");}catch(e){}
let sortK="score",sortAsc=false,page=1,PER_PAGE=50;
let filtered=[];
let activeRow=null;

const f={q:"",type:"",rsiMin:"",rsiMax:"",rsiZone:"",scoreMin:"",peMax:"",fpeMax:"",epsMin:"",revMin:"",roeMin:"",sectors:new Set()};

/* ── Sectors ─────────────────────────────────────────── */
const SECTORS=[...new Set(RAW.map(d=>d.sector))].sort();
function buildSectors(){
  const el=document.getElementById("sectorList");
  el.innerHTML=SECTORS.map(s=>`<label class="sector-item"><input type="checkbox" data-s="${s}" checked> ${s}</label>`).join("");
  SECTORS.forEach(s=>f.sectors.add(s));
  el.querySelectorAll("input").forEach(cb=>{
    cb.addEventListener("change",()=>{
      if(cb.checked)f.sectors.add(cb.dataset.s); else f.sectors.delete(cb.dataset.s);
      go();
    });
  });
}

/* ── Filter & sort ───────────────────────────────────── */
function applyFilters(){
  filtered=RAW.filter(d=>{
    if(f.q&&!d.ticker.toLowerCase().includes(f.q)&&!d.name.toLowerCase().includes(f.q))return false;
    if(f.type&&d.type!==f.type)return false;
    if(!f.sectors.has(d.sector))return false;
    if(f.rsiZone==="os"&&(d.rsi==null||d.rsi>=30))return false;
    if(f.rsiZone==="n"&&(d.rsi==null||d.rsi<30||d.rsi>70))return false;
    if(f.rsiZone==="ob"&&(d.rsi==null||d.rsi<=70))return false;
    if(f.rsiMin!==""&&(d.rsi==null||d.rsi<+f.rsiMin))return false;
    if(f.rsiMax!==""&&(d.rsi==null||d.rsi>+f.rsiMax))return false;
    if(f.scoreMin!==""&&d.score<+f.scoreMin)return false;
    if(f.peMax!==""&&(d.pe==null||d.pe>+f.peMax))return false;
    if(f.fpeMax!==""&&(d.fwdPe==null||d.fwdPe>+f.fpeMax))return false;
    if(f.epsMin!==""&&(d.eps_growth==null||d.eps_growth<+f.epsMin))return false;
    if(f.revMin!==""&&(d.rev_growth==null||d.rev_growth<+f.revMin))return false;
    if(f.roeMin!==""&&(d.roe==null||d.roe<+f.roeMin))return false;
    return true;
  });
  filtered.sort((a,b)=>{
    const av=a[sortK]??-Infinity,bv=b[sortK]??-Infinity;
    if(typeof av==="string")return sortAsc?av.localeCompare(bv):bv.localeCompare(av);
    return sortAsc?av-bv:bv-av;
  });
}

function go(){applyFilters();page=1;renderStats();renderTable();renderPagination();}

/* ── Stats bar ───────────────────────────────────────── */
function avg(arr,k){const vals=arr.map(d=>d[k]).filter(v=>v!=null);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;}
function renderStats(){
  const n=filtered.length;
  const aScore=avg(filtered,"score"),aRSI=avg(filtered,"rsi"),aPE=avg(filtered,"pe");
  document.getElementById("statsbar").innerHTML=`
    <div class="stat"><div class="stat-l">Showing</div><div class="stat-v">${n} / ${RAW.length}</div></div>
    <div class="stat"><div class="stat-l">Avg Score</div><div class="stat-v">${aScore!=null?aScore.toFixed(1):"—"}</div></div>
    <div class="stat"><div class="stat-l">Avg RSI</div><div class="stat-v">${aRSI!=null?aRSI.toFixed(1):"—"}</div></div>
    <div class="stat"><div class="stat-l">Avg P/E</div><div class="stat-v">${aPE!=null?aPE.toFixed(1):"—"}</div></div>
    <div class="stat"><div class="stat-l">Oversold (&lt;30)</div><div class="stat-v" style="color:var(--accent)">${filtered.filter(d=>d.rsi!=null&&d.rsi<30).length}</div></div>
    <div class="stat"><div class="stat-l">Overbought (&gt;70)</div><div class="stat-v" style="color:var(--red)">${filtered.filter(d=>d.rsi!=null&&d.rsi>70).length}</div></div>`;
  document.getElementById("resultsCount").textContent=`${n} results`;
}

/* ── Table ───────────────────────────────────────────── */
function rsiBadge(v){if(v==null)return"—";const cls=v<30?"rsi-os":v>70?"rsi-ob":"rsi-n";return`<span class="rsi-badge ${cls}">${v}</span>`;}
function scBadge(v){const cls=v>=7?"sc-h":v>=4?"sc-m":"sc-l";return`<span class="sc-badge ${cls}">${v}</span>`;}
function fmt(v,dec=1){return v==null?"—":typeof v==="number"?v.toFixed(dec):v;}

function renderTable(){
  const start=(page-1)*PER_PAGE,slice=filtered.slice(start,start+PER_PAGE);
  document.getElementById("tbody").innerHTML=slice.map(d=>`
    <tr data-t="${d.ticker}" class="${activeRow===d.ticker?"active":""}">
      <td class="tc">${d.ticker}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${d.name}</td>
      <td>${d.sector}</td>
      <td><span class="type-tag">${d.type}</span></td>
      <td>$${fmt(d.price)}</td>
      <td>${rsiBadge(d.rsi)}</td>
      <td>${fmt(d.pe)}</td>
      <td>${fmt(d.fwdPe)}</td>
      <td>${d.eps_growth!=null?(d.eps_growth>0?"+":"")+d.eps_growth+"%":"—"}</td>
      <td>${scBadge(d.score)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;color:var(--dim);font-size:.75rem">${notes[d.ticker]||d.notes}</td>
    </tr>`).join("");
  document.querySelectorAll("#tbody tr").forEach(tr=>{
    tr.addEventListener("click",()=>openDrawer(tr.dataset.t));
  });
}

/* ── Pagination ──────────────────────────────────────── */
function renderPagination(){
  const total=Math.ceil(filtered.length/PER_PAGE);
  const el=document.getElementById("pagination");
  if(total<=1){el.innerHTML="";return;}
  let html=`<span class="pg-info">Page ${page} of ${total}</span>`;
  html+=`<button class="pg-btn" ${page===1?"disabled":""} id="pgPrev">← Prev</button>`;
  const lo=Math.max(1,page-2),hi=Math.min(total,page+2);
  if(lo>1)html+=`<button class="pg-btn" data-p="1">1</button>${lo>2?`<span style="color:var(--dim);padding:0 .2rem">…</span>`:""}`;
  for(let i=lo;i<=hi;i++)html+=`<button class="pg-btn ${i===page?"active":""}" data-p="${i}">${i}</button>`;
  if(hi<total)html+=`${hi<total-1?`<span style="color:var(--dim);padding:0 .2rem">…</span>`:`<button class="pg-btn" data-p="${total-1}">${total-1}</button>`}<button class="pg-btn" data-p="${total}">${total}</button>`;
  html+=`<button class="pg-btn" ${page===total?"disabled":""} id="pgNext">Next →</button>`;
  el.innerHTML=html;
  el.querySelector("#pgPrev")?.addEventListener("click",()=>{page--;renderTable();renderPagination();});
  el.querySelector("#pgNext")?.addEventListener("click",()=>{page++;renderTable();renderPagination();});
  el.querySelectorAll("[data-p]").forEach(b=>b.addEventListener("click",()=>{page=+b.dataset.p;renderTable();renderPagination();}));
}

/* ── Drawer ──────────────────────────────────────────── */
function openDrawer(ticker){
  const d=RAW.find(r=>r.ticker===ticker);if(!d)return;
  activeRow=ticker;renderTable();
  document.getElementById("dr-ticker").textContent=d.ticker;
  document.getElementById("dr-name").textContent=`${d.name} · ${d.type} · ${d.sector}`;
  document.getElementById("dr-price").innerHTML=`$${fmt(d.price)} ${rsiBadge(d.rsi)}`;
  drawGauge(d.rsi);
  document.getElementById("dr-kv").innerHTML=[
    ["P/E",fmt(d.pe)],["Fwd P/E",fmt(d.fwdPe)],
    ["EPS Gr%",d.eps_growth!=null?d.eps_growth+"%":"—"],["Rev Gr%",d.rev_growth!=null?d.rev_growth+"%":"—"],
    ["ROE%",d.roe!=null?d.roe+"%":"—"],["D/E",fmt(d.debt_equity,2)],
    ["Mkt Cap",d.market_cap_b!=null?"$"+d.market_cap_b+"B":"—"],["Score",scBadge(d.score)],
  ].map(([l,v])=>`<div class="kv"><div class="kv-l">${l}</div><div class="kv-v">${v}</div></div>`).join("");
  const rsi=d.rsi;
  let sig="",sigClass="ta-neut";
  if(rsi==null)sig="No RSI data";
  else if(rsi<20){sig="Strongly Oversold — high bounce probability";sigClass="ta-bull";}
  else if(rsi<30){sig="Oversold — mean-reversion opportunity";sigClass="ta-bull";}
  else if(rsi<45){sig="Approaching oversold — watch for entry";sigClass="ta-bull";}
  else if(rsi<=55){sig="Neutral — no directional bias";sigClass="ta-neut";}
  else if(rsi<=70){sig="Trending higher — momentum intact";sigClass="ta-neut";}
  else if(rsi<=80){sig="Overbought — consider trimming";sigClass="ta-bear";}
  else{sig="Strongly Overbought — pullback likely";sigClass="ta-bear";}
  document.getElementById("dr-signal").innerHTML=`<span class="ta-pill ${sigClass}">${sig}</span>`;
  document.getElementById("dr-notes").value=notes[ticker]||d.notes||"";
  document.getElementById("dr-notes").oninput=function(){notes[ticker]=this.value;localStorage.setItem(NOTES_KEY,JSON.stringify(notes));renderTable();};
  document.getElementById("dr-yf").href=`https://finance.yahoo.com/chart/${ticker}`;
  document.getElementById("drawer").classList.add("open");
  document.getElementById("overlay").classList.add("on");
}

function drawGauge(rsi){
  const svg=document.getElementById("gaugeSvg");
  if(rsi==null){svg.innerHTML="";document.getElementById("gaugeVal").textContent="—";document.getElementById("gaugeLabel").textContent="No RSI data";return;}
  const cx=100,cy=78,r=64;
  const pct=Math.max(0,Math.min(100,rsi))/100;
  const startA=Math.PI,endA=0;
  const toXY=(pct)=>{const a=Math.PI*(1-pct);return[cx+r*Math.cos(a),cy-r*Math.sin(a)];};
  const arc=(p1,p2,color)=>{const[x1,y1]=toXY(p1),[x2,y2]=toXY(p2);return`<path d="M${x1},${y1} A${r},${r} 0 0 1 ${x2},${y2}" stroke="${color}" stroke-width="10" fill="none" stroke-linecap="round"/>`;};
  const[nx,ny]=toXY(pct);
  svg.innerHTML=
    arc(0,0.3,"#3fb950")+arc(0.3,0.7,"#8b949e")+arc(0.7,1,"#f85149")+
    `<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/>
     <circle cx="${cx}" cy="${cy}" r="4" fill="var(--text)"/>`;
  document.getElementById("gaugeVal").innerHTML=`<span style="color:${rsi<30?"var(--accent)":rsi>70?"var(--red)":"var(--text)"}">${rsi}</span>`;
  document.getElementById("gaugeLabel").textContent=rsi<30?"Oversold":rsi>70?"Overbought":"Neutral";
}

function closeDrawer(){
  activeRow=null;renderTable();
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("overlay").classList.remove("on");
}
document.getElementById("drClose").addEventListener("click",closeDrawer);
document.getElementById("overlay").addEventListener("click",closeDrawer);

/* ── Sort ────────────────────────────────────────────── */
document.querySelectorAll("th[data-k]").forEach(th=>{
  th.addEventListener("click",()=>{
    if(sortK===th.dataset.k)sortAsc=!sortAsc; else{sortK=th.dataset.k;sortAsc=false;}
    document.querySelectorAll("th").forEach(t=>{t.classList.remove("sorted");t.querySelector(".sort-arrow")&&(t.querySelector(".sort-arrow").textContent="↕");});
    th.classList.add("sorted");th.querySelector(".sort-arrow").textContent=sortAsc?"↑":"↓";
    go();
  });
});

/* ── Sidebar controls ────────────────────────────────── */
document.getElementById("searchBox").addEventListener("input",e=>{f.q=e.target.value.trim().toLowerCase();go();});
document.querySelectorAll(".type-btn").forEach(b=>{
  b.addEventListener("click",()=>{document.querySelectorAll(".type-btn").forEach(x=>x.classList.remove("on"));b.classList.add("on");f.type=b.dataset.t;go();});
});
["rsiMin","rsiMax","scoreMin","peMax","fpeMax","epsMin","revMin","roeMin"].forEach(id=>{
  document.getElementById(id).addEventListener("input",e=>{f[id]=e.target.value;go();});
});
document.querySelectorAll(".qbtn").forEach(b=>{
  b.addEventListener("click",()=>{
    const zone=b.dataset.rsi;
    if(f.rsiZone===zone){f.rsiZone="";document.querySelectorAll(".qbtn").forEach(x=>x.classList.remove("on"));}
    else{f.rsiZone=zone;document.querySelectorAll(".qbtn").forEach(x=>x.classList.remove("on"));b.classList.add("on");}
    go();
  });
});

/* ── Presets ─────────────────────────────────────────── */
document.querySelectorAll(".preset").forEach(b=>{
  b.addEventListener("click",()=>{
    resetFilters();
    const p=b.dataset.p;
    if(p==="highscore")f.scoreMin="7";
    else if(p==="value"){f.peMax="15";f.scoreMin="5";}
    else if(p==="growth"){f.epsMin="20";f.revMin="15";}
    else if(p==="oversold"){f.rsiZone="os";document.querySelector('.qbtn[data-rsi="os"]').classList.add("on");}
    else if(p==="overbought"){f.rsiZone="ob";document.querySelector('.qbtn[data-rsi="ob"]').classList.add("on");}
    if(f.scoreMin)document.getElementById("scoreMin").value=f.scoreMin;
    if(f.peMax)document.getElementById("peMax").value=f.peMax;
    if(f.epsMin)document.getElementById("epsMin").value=f.epsMin;
    if(f.revMin)document.getElementById("revMin").value=f.revMin;
    go();
  });
});

function resetFilters(){
  Object.assign(f,{q:"",type:"",rsiMin:"",rsiMax:"",rsiZone:"",scoreMin:"",peMax:"",fpeMax:"",epsMin:"",revMin:"",roeMin:""});
  f.sectors=new Set(SECTORS);
  ["searchBox","rsiMin","rsiMax","scoreMin","peMax","fpeMax","epsMin","revMin","roeMin"].forEach(id=>document.getElementById(id).value="");
  document.querySelectorAll(".type-btn").forEach(b=>b.classList.remove("on"));
  document.querySelector('.type-btn[data-t=""]').classList.add("on");
  document.querySelectorAll(".qbtn").forEach(b=>b.classList.remove("on"));
  document.querySelectorAll("#sectorList input").forEach(cb=>{cb.checked=true;f.sectors.add(cb.dataset.s);});
}
document.getElementById("resetBtn").addEventListener("click",()=>{resetFilters();go();});

/* ── Init ────────────────────────────────────────────── */
buildSectors();
go();
</script>
